services:
  - type: web
    name: file-security-scanner
    runtime: python
    pythonVersion: 3.11
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app
    envVars:
      - key: VT_API_KEY
        scope: RUN
        generateValue: false
      - key: FLASK_ENV
        value: production

